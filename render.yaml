services:
  - type: web
    name: dams-belleza
    env: node
    plan: starter
    region: frankfurt
    rootDir: .
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npm run start:render
    healthCheckPath: /api/health/ready
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: WHATSAPP_NUMBER
        sync: false
      - key: STORE_NAME
        value: Dam's belleza
      - key: RUN_SEED_ON_BOOT
        value: "false"
      - key: SEED_PASSWORD
        sync: false
